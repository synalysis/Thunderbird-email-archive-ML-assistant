name: Build add-on

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .xpi
        run: bash ./package-addon.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-archive-assistant-xpi
          path: dist/Email-Archive-Assistant-*.xpi
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Email-Archive-Assistant-*.xpi
          generate_release_notes: true
