<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Email Archive Assistant</title>
  <link rel="stylesheet" type="text/css" href="archive.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      width: 100%;
      height: 100vh;
    }
    
    select, button {
      margin: 8px;
      padding: 8px;
    }
    
    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      margin-top: 20px;
    }
    
    th, td {
      padding: 8px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    th {
      background-color: #f5f5f5;
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    
    th:hover {
      background-color: #e5e5e5;
    }
    
    th::after {
      content: '⇅';
      position: absolute;
      right: 8px;
      color: #999;
    }
    
    th.sort-asc::after {
      content: '↑';
      color: #000;
    }
    
    th.sort-desc::after {
      content: '↓';
      color: #000;
    }
    
    tr:hover {
      background-color: #f9f9f9;
    }
    
    .actions {
      margin: 16px 8px;
    }
    
    #status {
      margin: 16px 8px;
      padding: 8px;
      border-radius: 4px;
    }
    
    .success { background: #e6ffe6; }
    .error { background: #ffe6e6; }
    
    .confidence-control {
      display: flex;
      align-items: center;
      margin: 8px;
      gap: 10px;
    }
    
    .confidence-control input[type="range"] {
      width: 200px;
    }
    
    .low-confidence {
      color: #999;
      font-style: italic;
    }
    
    /* Column widths */
    .col-checkbox { 
      width: 40px;
      padding-right: 20px;
    }
    .col-account { width: 14%; }
    .col-date { width: 11%; }
    .col-from { width: 18%; }
    .col-subject { width: 26%; }
    .col-confidence { width: 11%; }
    .col-target { width: 20%; }
    
    /* Confidence value styling */
    .confidence-value {
      text-align: right;
      padding-right: 16px;
    }
    
    .confidence-high { color: #2d7d3f; }
    .confidence-medium { color: #b36b00; }
    .confidence-low { color: #c92a2a; }

    /* Low confidence target folder styling */
    .target-folder.low-confidence {
      color: #c92a2a;
    }
    
    /* Fix checkbox column overlap */
    th.col-checkbox {
      padding-right: 20px;
    }
    th.col-checkbox::after {
      content: none;
    }

    .account-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .account-section select {
      flex: 1;
    }

    .refresh-button {
      padding: 8px;
      min-width: 40px;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .refresh-button:hover {
      background: #e0e0e0;
    }

    .refresh-button:active {
      background: #d0d0d0;
    }

    .primary-button {
      font-weight: 600;
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 4px;
    }

    .primary-button:hover:not(:disabled) {
      background: #1b4332;
    }

    .primary-button:disabled {
      background: #95b8a8;
      color: #eee;
    }

    .secondary-button {
      background: #f0f0f0;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .llama-status {
      margin: 0 8px 8px;
      padding: 6px 10px;
      font-size: 0.9em;
      border-radius: 4px;
    }

    .llama-status.ok {
      background: #e8f4ec;
      color: #1b4332;
    }

    .llama-status.error {
      background: #ffe6e6;
      color: #862e2e;
    }
  </style>
</head>
<body>
  <h2>Email Archive Assistant</h2>
  <div id="llamaStatus" class="llama-status">Checking llama.cpp server…</div>
  
  <div class="account-section">
    <select id="accountSelect">
      <option value="">Select Account</option>
    </select>
    <button id="refreshAccounts" class="refresh-button" title="Refresh account list">↻</button>
  </div>
  
  <div class="actions">
    <div class="confidence-control">
      <label for="confidenceSlider">Confidence Threshold:</label>
      <input type="range" id="confidenceSlider" min="0" max="100" value="50" step="5">
      <span id="confidenceValue">50%</span>
    </div>
    <button id="archiveConfidentButton" class="primary-button" disabled>Archive confident</button>
    <button id="reclassifyButton" class="secondary-button">Re-classify all</button>
    <button id="moveSelectedButton" class="secondary-button" disabled>Move selected</button>
  </div>
  
  <div id="status"></div>
  
  <table>
    <thead>
      <tr>
        <th class="col-checkbox"><input type="checkbox" id="selectAll"></th>
        <th class="col-account" data-sort="account">Account</th>
        <th class="col-date" data-sort="date">Date</th>
        <th class="col-from" data-sort="from">From</th>
        <th class="col-subject" data-sort="subject">Subject</th>
        <th class="col-confidence" data-sort="confidence">Confidence</th>
        <th class="col-target" data-sort="target">Target Folder</th>
      </tr>
    </thead>
    <tbody id="messageList">
    </tbody>
  </table>

  <script src="bg-api.js"></script>
  <script src="llama-client.js"></script>
  <script src="archive.js"></script>
</body>
</html>
