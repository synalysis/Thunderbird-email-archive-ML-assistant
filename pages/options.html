<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Email Archive Assistant</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 16px;
      line-height: 1.45;
    }
    button {
      padding: 8px 16px;
      font: inherit;
      cursor: pointer;
    }
    #status {
      margin-top: 12px;
      color: #555;
    }
    #status.error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <h2>Email Archive Assistant</h2>
  <p>
    Configure Ollama, train the folder index, and run inbox archiving in the assistant window
    (Training and Archive tabs).
  </p>
  <p>
    You can also use the toolbar icon or, if listed, <strong>≡ menu → Tools</strong>.
  </p>
  <button type="button" id="openAssistant">Open assistant</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
